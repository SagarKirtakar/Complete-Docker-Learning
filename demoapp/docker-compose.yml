services:

  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_DATABASE: dockerdb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: password

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - spring-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: springboot-app

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    restart: always

    networks:
      - spring-network

networks:
  spring-network:

volumes:
  mysql-data: