services:
  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_DATABASE: docker_demodb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - spring-network


  app:
    build: .
    container_name: springapp

    ports:
      - "8080:8080"

    depends_on:
      - mysql

    restart: always

    networks:
      - spring-network


networks:
  spring-network:
    driver: bridge

volumes:
  mysql-data:
