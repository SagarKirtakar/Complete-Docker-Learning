services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: docker_demodb
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      DATABASE_PORT: 3306


  app:
    build: .
    image: sagar/docker-demo-app:1.1
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/docker_demodb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password

    depends_on:
      - mysql

